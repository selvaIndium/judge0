x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

# cgroup v2 fix: cap_add/security_opt/cgroupns/volumes replace `privileged: true`
# for services that run isolate sandboxes. This gives the container:
#   - SYS_ADMIN: required for mount namespaces and cgroup operations in isolate
#   - seccomp:unconfined: isolate uses clone()/unshare() syscalls that a default
#     seccomp profile blocks
#   - cgroupns: host: shares the host cgroup namespace so /sys/fs/cgroup paths
#     seen inside the container match the real hierarchy
#   - /sys/fs/cgroup:rw: allows isolate to create sub-cgroups at runtime
# These options work on both cgroup v1 and v2 hosts.
x-isolate-runtime: &isolate-runtime
  cap_add:
    - SYS_ADMIN
  security_opt:
    - seccomp:unconfined
  cgroupns: host
  volumes:
    - /sys/fs/cgroup:/sys/fs/cgroup:rw

services:
  server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "2358:2358"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    cgroupns: host
    <<: *default-logging
    restart: always

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    cgroupns: host
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  data:
