services:
  judge0:
    image: judge0/judge0:latest-dev
    build:
      context: .
      target: development
    volumes:
      - .:/api
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "2358:2358"
      - "3001:3001" # For ./scripts/dev/serve-docs
    # cgroup v2 fix: replaced `privileged: true` with minimal capabilities so
    # isolate can create cgroup sandboxes on both cgroup v1 and v2 hosts.
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    cgroupns: host

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    restart: always

volumes:
  data:
